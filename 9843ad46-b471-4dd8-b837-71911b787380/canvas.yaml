    description: "Transforms raw SEER esophageal cancer data into engineered features\
      \ & composite risk score (0\u2013100). Extracts age, histology, & treatment\
      \ details; infers missing stage via surgery/node/radiation algorithms; calculates\
      \ weighted risk drivers (stage 35%, treatment 30%, age 20%, year 10%, nodes\
